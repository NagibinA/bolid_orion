send_command:
  name: Send Orion Command
  description: Отправляет команду устройству Болид через MQTT шлюз
  fields:
    address:
      name: Address
      description: "Адрес устройства (1-127)"
      required: true
      example: 2
      selector:
        number:
          min: 1
          max: 127
          step: 1
    command:
      name: Command
      description: "Код команды (например, 13 - запрос статуса)"
      required: true
      example: 13
      selector:
        number:
          min: 0
          max: 255
    data:
      name: Data
      description: "Данные команды (через точку с запятой)"
      required: false
      example: "0;0"
      selector:
        text:

send_raw_command:
  name: Send Raw Orion Command
  description: Отправляет сырую команду в формате "адрес;длина;ключ;команда;данные..."
  fields:
    command:
      name: Command
      description: "Полная команда в формате адрес;длина;ключ;команда;данные..."
      required: true
      example: "2;6;0;13;0;0"
      selector:
        text:

scan_devices:
  name: Scan Orion Devices
  description: Сканирует адреса 1-127 и возвращает список найденных устройств
  fields: {}
